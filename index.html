<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ROCK, PAPER, SCISSORS</h1>
    <p>Choose your move to play against the computer:</p>

    <div class="choices">
        <button id="rock">🪨 Rock</button>
        <button id="paper">📄 Paper</button>
        <button id="scissors">✂️ Scissors</button>
    </div>

    <div class="result-box" id="gameResult">Click a button to start!</div>

    <div class="score-board">
        <div>Player <span class="score" id="playerScore">0</span></div>
        <div>Computer <span class="score" id="computerScore">0</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
